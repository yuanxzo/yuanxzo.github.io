theme: jekyll-theme-minimal
# 网站基本信息
title: "Welcome - Bo Yang (杨博)"
description: "研究方向 | 论文 | 项目"
url: "https://yuanxzo.github.io"  # 替换为你的实际域名

# Markdown 渲染引擎
markdown: kramdown

# 永久链接格式
permalink: /:title/

# 排除文件（构建时不包含）
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# 默认布局设置
defaults:
  - scope:
      path: ""
    values:
      layout: "page"  # 所有页面默认使用 page 布局
  
